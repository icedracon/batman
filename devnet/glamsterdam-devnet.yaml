# Local multi-EL Glamsterdam / Gloas devnet for Batman BAL differential testing.
#
# Brings up several execution clients on one Gloas network (EIP-7732 ePBS +
# EIP-7928 Block-Level Access Lists) so Batman can ask each EL to build the same
# block and compare their independently-computed Block Access Lists.
#
# Run:
#   kurtosis run --enclave batman-gloas github.com/ethpandaops/ethereum-package \
#     --args-file devnet/glamsterdam-devnet.yaml
#
# Image tags below are the historical Glamsterdam devnet images used for the
# committed public evidence artifacts.
# (ethpandaops/<client>:glamsterdam-devnet-0, verified on hub.docker.com/u/ethpandaops
# 2026-04-29). For the maintainer-recommended latest line, use
# devnet/glamsterdam-devnet5.yaml.
# If `kurtosis run` fails to pull a specific image, comment that participant out and
# verify the tag at https://hub.docker.com/u/ethpandaops.

participants:
  # All four EL images confirmed present on Docker Hub (2026-04-29) and the
  # geth/erigon/lighthouse images were pre-pulled successfully. besu is omitted
  # (ethpandaops/besu:glamsterdam-devnet-0 is not built yet).
  - el_type: geth
    el_image: "ethpandaops/geth:glamsterdam-devnet-0"
    cl_type: lighthouse
    cl_image: "ethpandaops/lighthouse:glamsterdam-devnet-0"
    count: 1

  - el_type: erigon
    el_image: "ethpandaops/erigon:glamsterdam-devnet-0"
    cl_type: lighthouse
    cl_image: "ethpandaops/lighthouse:glamsterdam-devnet-0"
    count: 1

  - el_type: reth
    el_image: "ethpandaops/reth:glamsterdam-devnet-0"
    cl_type: lighthouse
    cl_image: "ethpandaops/lighthouse:glamsterdam-devnet-0"
    count: 1

  - el_type: nethermind
    el_image: "ethpandaops/nethermind:glamsterdam-devnet-0"
    cl_type: lighthouse
    cl_image: "ethpandaops/lighthouse:glamsterdam-devnet-0"
    count: 1

network_params:
  network: "kurtosis"
  preset: "minimal"            # matches the historical devnet-0 config (faster)
  electra_fork_epoch: 0
  fulu_fork_epoch: 0
  gloas_fork_epoch: 1          # Gloas (ePBS + BAL) at epoch 1, as in the historical run
  seconds_per_slot: 6
  # Fulu/PeerDAS validation in ethereum-package requires at least one node with
  # 128+ validators unless using a larger perfect-peerdas topology.
  num_validator_keys_per_node: 128

# Dora = lightweight beacon explorer to eyeball blocks/payloads. Targeted BAL
# fixtures are driven by the Batman harness (engine_getPayloadV6), not random
# traffic, so a tx spammer is optional (add "spamoor" or "tx_spammer" for load).
additional_services:
  - dora
