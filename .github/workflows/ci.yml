name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e .

      - name: Unit tests
        run: python -m unittest discover

      - name: CLI smoke tests
        run: |
          python -m batman_detector validate examples/traces/bal_system_index_confusion.generated.json
          python -m batman_detector static-scan examples/audit_targets/bal_first_scan.sample.json --format json
          python -m batman_detector run examples/traces/bal_system_index_confusion.generated.json --format json

      - name: Offline BAL canonicalization fuzzer
        run: python -m batman_detector.bal.fuzzer --iterations 64 --include-malformed --format json

      - name: Compatibility snapshot smoke test
        run: |
          python -m batman_detector compatibility-snapshot \
            --heads artifacts/devnet5-live-heads.json \
            --smoke artifacts/devnet5-live-smoke.json \
            --four-way-output artifacts/devnet5-live-4way-diff.txt \
            --subset-trace artifacts/devnet5-live-trace.json \
            --subset-report artifacts/devnet5-live-report.md \
            --output artifacts/compatibility-snapshot.gloas-devnet5.json \
            --batman-commit "$GITHUB_SHA" \
            --metadata ci=true
          python -m batman_detector validate artifacts/compatibility-snapshot.gloas-devnet5.json \
            --schema compatibility-snapshot

      - name: Public evidence bundle smoke test
        run: |
          python -m batman_detector evidence-pack \
            --output-dir dist/public-evidence \
            --verify
          test -f dist/public-evidence/manifest.json
          test -f dist/public-evidence/README.md
