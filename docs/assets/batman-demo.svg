<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Batman EIP-7928 BAL detector demo">
  <style>
    .bg{fill:#0a0d12}.panel{fill:#13181f;stroke:#303945;stroke-width:2}.title{font:700 34px monospace;fill:#8ab4f8}.sub{font:700 21px monospace;fill:#dbe2ea}.muted{font:17px monospace;fill:#85919e}.cmd{font:18px monospace;fill:#8ab4f8}.ok{font:18px monospace;fill:#7ee787}.warn{font:18px monospace;fill:#facc15}.txt{font:18px monospace;fill:#dbe2ea}.step{font:15px monospace;fill:#8ab4f8}.s2,.s3,.s4{opacity:0}.s1{animation:a1 12s infinite}.s2{animation:a2 12s infinite}.s3{animation:a3 12s infinite}.s4{animation:a4 12s infinite}@keyframes a1{0%,24%{opacity:1}25%,100%{opacity:0}}@keyframes a2{0%,24%{opacity:0}25%,49%{opacity:1}50%,100%{opacity:0}}@keyframes a3{0%,49%{opacity:0}50%,74%{opacity:1}75%,100%{opacity:0}}@keyframes a4{0%,74%{opacity:0}75%,100%{opacity:1}}
  </style>
  <rect class="bg" width="960" height="540"/>
  <text x="36" y="56" class="title">BATMAN</text><text x="185" y="55" class="sub">Glamsterdam BAL detector</text>
  <text x="36" y="90" class="muted">reproducible cross-client Ethereum upgrade-readiness workflow</text>
  <rect x="36" y="122" width="888" height="354" rx="14" class="panel"/>
  <circle cx="62" cy="146" r="6" fill="#f87171"/><circle cx="82" cy="146" r="6" fill="#facc15"/><circle cx="102" cy="146" r="6" fill="#7ee787"/>
  <g class="s1"><text x="58" y="196" class="step">1/4 synthetic control fixture</text><text x="58" y="238" class="cmd">$ python -m batman_detector.bal.fixtures &gt; trace.json</text><text x="58" y="278" class="txt">fixture provenance: synthetic_control</text><text x="58" y="318" class="ok">✓ trace created offline</text></g>
  <g class="s2"><text x="58" y="196" class="step">2/4 deterministic canonicalization fuzzing</text><text x="58" y="238" class="cmd">$ python -m batman_detector.bal.fuzzer --iterations 64</text><text x="58" y="278" class="txt">mutator_count: 7</text><text x="58" y="318" class="ok">✓ missed_mutations: []</text><text x="58" y="358" class="ok">✓ repair_failures: []</text></g>
  <g class="s3"><text x="58" y="196" class="step">3/4 private-devnet multi-client differential</text><text x="58" y="238" class="cmd">$ python -m batman_detector bal-diff-live --refresh ...</text><text x="58" y="278" class="txt">clients: geth, erigon, reth, nethermind</text><text x="58" y="318" class="warn">erigon ahead → honest 4-way refusal</text><text x="58" y="358" class="ok">✓ scoped 3-way differential: 0 findings</text></g>
  <g class="s4"><text x="58" y="196" class="step">4/4 reviewer-safe evidence export</text><text x="58" y="238" class="cmd">$ python -m batman_detector.evidence_bundle ...</text><text x="58" y="278" class="txt">explicit artifacts only • SHA-256 manifest</text><text x="58" y="318" class="txt">secret-looking filenames rejected</text><text x="58" y="358" class="ok">✓ reviewer bundle ready for manual review</text></g>
  <text x="36" y="516" class="muted">local/private devnet only • EIP-7928 BAL differential testing</text>
</svg>
